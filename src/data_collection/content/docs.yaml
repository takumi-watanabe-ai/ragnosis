# Official documentation sources for RAG ecosystem

langchain_docs:
  name: "LangChain Documentation"
  source_id: "langchain-docs"
  sitemap_url: "https://docs.langchain.com/sitemap.xml"
  url_pattern: "docs.langchain.com"
  exclude_patterns:
    - "/api-reference/"
    - "/changelog"
    - "/release-notes"
    - "/security/"
    - "/community/"
    - "/pricing/"
  enabled: true
  priority: 1
  section_patterns:
    guides: "/oss/python/langchain/how-to/"
    tutorials: "/oss/python/langchain/tutorials/"
    concepts: "/oss/python/langchain/concepts/"
    integrations: "/oss/python/langchain/integrations/"

llamaindex_docs:
  name: "LlamaIndex Documentation"
  source_id: "llamaindex-docs"
  sitemap_url: "https://developers.llamaindex.ai/sitemap-index.xml"
  url_pattern: "developers.llamaindex.ai"
  exclude_patterns:
    - "/changelog"
    - "/release-notes"
    - "/community/"
  enabled: true
  priority: 2
  section_patterns:
    guides: "/python/framework/understanding/"
    examples: "/python/framework/examples/"
    api: "/python/framework/api/"

pinecone_docs:
  name: "Pinecone Documentation"
  source_id: "pinecone-docs"
  sitemap_url: "https://docs.pinecone.io/sitemap.xml"
  url_pattern: "docs.pinecone.io"
  exclude_patterns: ["/reference/api/", "/assistant-release-notes/"]
  enabled: true
  priority: 3
  section_patterns:
    guides: "/guides/"
    examples: "/examples/"
    reference: "/reference/"

pinecone_learn:
  name: "Pinecone Learn"
  source_id: "pinecone-learn"
  sitemap_url: "https://www.pinecone.io/sitemap.xml"
  url_pattern: "https://www.pinecone.io/learn/"
  exclude_patterns: ["/learn</loc>", "/learn/series/"]
  enabled: true
  priority: 4

