weaviate_docs:
  name: "Weaviate Documentation"
  source_id: "weaviate-docs"
  sitemap_url: "https://docs.weaviate.io/sitemap.xml"
  url_pattern: "docs.weaviate.io/weaviate"
  exclude_patterns:
    - "/changelog"
    - "/release-notes"
  enabled: true
  priority: 7
  section_patterns:
    concepts: "/weaviate/concepts/"
    configuration: "/weaviate/config/"
    api: "/weaviate/api/"

chromadb_docs:
  name: "ChromaDB Documentation"
  source_id: "chromadb-docs"
  sitemap_url: "https://docs.trychroma.com/sitemap.xml"
  url_pattern: "docs.trychroma.com"
  exclude_patterns:
    - "/changelog"
    - "/release-notes"
  enabled: true
  priority: 8
  section_patterns:
    guides: "/guides/"
    reference: "/reference/"

qdrant_docs:
