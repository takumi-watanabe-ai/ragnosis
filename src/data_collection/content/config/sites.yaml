# Blog site configurations - Sitemap scraping only

langchain:
  name: "LangChain Blog"
  source_id: "langchain"
  sitemap_url: "https://blog.langchain.com/sitemap.xml"
  sitemap_posts_url: "https://blog.langchain.com/sitemap-posts.xml"
  url_pattern: "blog.langchain.com"
  exclude_patterns: []
  enabled: true
  priority: 1

llamaindex:
  name: "LlamaIndex Blog"
  source_id: "llamaindex"
  sitemap_url: "https://www.llamaindex.ai/sitemap-index.xml"
  sitemap_posts_url: "https://www.llamaindex.ai/sitemap-0.xml"
  url_pattern: "/blog/"
  exclude_patterns: ["/blog</loc>", "/tag/", "/author/"]
  enabled: true
  priority: 2

pinecone:
  name: "Pinecone Learn"
  source_id: "pinecone"
  sitemap_url: "https://www.pinecone.io/sitemap.xml"
  url_pattern: "/learn/"
  exclude_patterns: ["/learn</loc>", "/learn/series/"]
  enabled: true
  priority: 3

weaviate:
  name: "Weaviate Blog"
  source_id: "weaviate"
  sitemap_url: "https://weaviate.io/sitemap.xml"
  url_pattern: "weaviate.io"
  exclude_patterns: ["/docs/", "/developers/", "/company/", "/platform/"]
  enabled: true
  priority: 4

huggingface:
  name: "HuggingFace Blog"
  source_id: "huggingface"
  sitemap_url: "https://huggingface.co/sitemap.xml"
  sitemap_posts_url: "https://huggingface.co/sitemap-blog.xml"
  url_pattern: "huggingface.co/blog"
  exclude_patterns: []
  enabled: true
  priority: 5
