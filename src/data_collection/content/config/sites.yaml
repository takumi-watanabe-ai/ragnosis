# Blog site configurations
# RSS: For daily monitoring (recent ~15 articles)
# Sitemap: For historical backfilling (ALL articles, 100s-1000s)

langchain:
  name: "LangChain Blog"
  source_id: "langchain"
  rss_url: "https://blog.langchain.com/rss/"
  sitemap_url: "https://blog.langchain.com/sitemap.xml"
  sitemap_posts_url: "https://blog.langchain.com/sitemap-posts.xml"  # Sub-sitemap for posts only
  url_pattern: "blog.langchain.com"
  exclude_patterns: []
  enabled: true
  priority: 1

llamaindex:
  name: "LlamaIndex Blog"
  source_id: "llamaindex"
  rss_url: "https://blog.llamaindex.ai/feed"
  sitemap_url: "https://www.llamaindex.ai/sitemap-index.xml"
  sitemap_posts_url: "https://www.llamaindex.ai/sitemap-0.xml"  # Main sitemap with all URLs
  url_pattern: "/blog/"
  exclude_patterns: ["/blog</loc>", "/tag/", "/author/"]  # Exclude index and tag pages
  enabled: true  # Enable for sitemap scraping (RSS doesn't work)
  priority: 2

pinecone:
  name: "Pinecone Learn"
  source_id: "pinecone"
  rss_url: "https://www.pinecone.io/rss/"
  sitemap_url: "https://www.pinecone.io/sitemap.xml"
  url_pattern: "/learn/"
  exclude_patterns: ["/learn</loc>", "/learn/series/"]  # Exclude index and series pages
  enabled: true
  priority: 3

weaviate:
  name: "Weaviate Blog"
  source_id: "weaviate"
  rss_url: "https://weaviate.io/blog/rss.xml"
  sitemap_url: "https://weaviate.io/sitemap.xml"
  url_pattern: "weaviate.io"
  exclude_patterns: ["/docs/", "/developers/", "/company/", "/platform/"]  # Exclude non-blog pages
  enabled: true
  priority: 4

huggingface:
  name: "HuggingFace Blog"
  source_id: "huggingface"
  rss_url: "https://huggingface.co/blog/feed.xml"
  sitemap_url: "https://huggingface.co/sitemap.xml"
  sitemap_posts_url: "https://huggingface.co/sitemap-blog.xml"  # Sub-sitemap for blog only
  url_pattern: "huggingface.co/blog"
  exclude_patterns: []
  enabled: true
  priority: 5
