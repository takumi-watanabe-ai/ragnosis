name: Daily Market Data (Time-Series)

on:
  schedule:
    # Run at 8:00 AM UTC daily
    - cron: '0 8 * * *'

  workflow_dispatch:

jobs:
  fetch-market-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt

      - name: Fetch market data (HF, GitHub, Trends)
        id: pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          HUGGINGFACE_API_KEY: ${{ secrets.HUGGINGFACE_API_KEY }}
          GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "📥 Running data pipeline..."
          python src/data_collection/pipeline.py

      - name: Summary
        if: always()
        run: |
          if [ "${{ steps.pipeline.outcome }}" != "success" ]; then
            echo "::error::❌ CRITICAL: Time-series data fetch failed!"
            echo "::error::This creates gaps in analytics data"
            exit 1
          else
            echo "✅ All market data fetched successfully!"
          fi
